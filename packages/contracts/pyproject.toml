[project]
name = "autocad-contracts"
version = "0.1.1"
description = "Shared strict contracts for the AutoCAD Gateway and simulated Agent"
requires-python = ">=3.10,<3.14"
dependencies = [
    "pydantic>=2.0,<3.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/autocad_contracts"]
