name: Phase 1.1 Bootstrap

on:
  workflow_dispatch:
  push:
    branches:
      - phase1.1-cad-core-hardening
    paths:
      - "scripts/phase1_1_bootstrap_part*.py"
      - ".github/workflows/phase1-1-bootstrap.yml"
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  apply-lock-test-commit:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          ref: phase1.1-cad-core-hardening
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v5

      - name: Apply Phase 1.1 patch
        id: apply_patch
        continue-on-error: true
        run: |
          set -o pipefail
          {
            python scripts/phase1_1_bootstrap_part0.py
            python scripts/phase1_1_bootstrap_part1.py
            python scripts/phase1_1_bootstrap_part2.py
            python scripts/phase1_1_bootstrap_part3.py
            python scripts/phase1_1_bootstrap_part4.py
            python scripts/phase1_1_bootstrap_part5.py
          } 2>&1 | tee phase1-1-bootstrap.log

      - name: Upload bootstrap diagnostics
        if: steps.apply_patch.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: phase1-1-bootstrap-diagnostics
          path: phase1-1-bootstrap.log
          if-no-files-found: error

      - name: Stop after bootstrap failure
        if: steps.apply_patch.outcome == 'failure'
        run: exit 1

      - name: Generate project lockfiles
        run: |
          uv lock
          uv lock --project packages/cad_core
          uv lock --project poc/fastmcp-phase0
          uv lock --project services/gateway
          uv lock --project poc/phase3-simulated-agent

      - name: Root regression and build
        run: |
          uv sync --locked --all-groups
          uv run pytest tests/ -q
          uv build --wheel

      - name: Standalone CAD Core test and build
        working-directory: packages/cad_core
        run: |
          uv sync --locked --group test
          uv run --locked --group test pytest -q
          uv build --wheel

      - name: Phase 0 test and build
        working-directory: poc/fastmcp-phase0
        run: |
          uv sync --locked --group test
          uv run --locked --group test pytest -q
          uv build --wheel

      - name: Gateway test and build
        working-directory: services/gateway
        run: |
          uv sync --locked --group test
          uv run --locked --group test pytest -q
          uv build --wheel

      - name: Simulated Agent test and build
        working-directory: poc/phase3-simulated-agent
        run: |
          uv sync --locked --group test
          uv run --locked --group test pytest -q
          uv build --wheel

      - name: Shared contracts build
        working-directory: packages/contracts
        run: uv build --wheel

      - name: Clean-install wheel smoke
        run: |
          mkdir -p wheelhouse
          uv build --wheel --out-dir wheelhouse packages/cad_core
          uv build --wheel --out-dir wheelhouse .
          python scripts/phase1_1_packaging_smoke.py --artifact-dir wheelhouse

      - name: Static and lock checks
        run: |
          git diff --check
          python -m compileall -q src packages/cad_core/src packages/cad_core/tests poc/fastmcp-phase0/src poc/fastmcp-phase0/tests services/gateway/src services/gateway/tests packages/contracts/src poc/phase3-simulated-agent/src poc/phase3-simulated-agent/tests
          uv lock --check
          uv lock --check --project packages/cad_core
          uv lock --check --project poc/fastmcp-phase0
          uv lock --check --project services/gateway
          uv lock --check --project poc/phase3-simulated-agent

      - name: Commit generated implementation and locks
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -- .github/workflows/phase0-fastmcp.yml .github/workflows/phase1-1-bootstrap.yml
          rm -f phase1-1-bootstrap.log
          rm -f scripts/phase1_1_bootstrap_part*.py
          git add -A
          git commit -m "Harden Phase 1.1 CAD Core packaging and read parity [skip ci]"
          git fetch origin phase1.1-cad-core-hardening
          git rebase origin/phase1.1-cad-core-hardening
          git push origin HEAD:phase1.1-cad-core-hardening
