name: FastMCP Phase 0

on:
  pull_request:
    paths:
      - "poc/fastmcp-phase0/**"
      - "poc/phase3-simulated-agent/**"
      - "packages/cad_core/**"
      - "packages/contracts/**"
      - "services/gateway/**"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/phase0-fastmcp.yml"
  push:
    branches:
      - main
    paths:
      - "poc/fastmcp-phase0/**"
      - "poc/phase3-simulated-agent/**"
      - "packages/cad_core/**"
      - "packages/contracts/**"
      - "services/gateway/**"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/phase0-fastmcp.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  compatibility:
    name: ${{ matrix.os }} / Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.10", "3.12", "3.13"]
    defaults:
      run:
        working-directory: poc/fastmcp-phase0
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - uses: astral-sh/setup-uv@v5
      - name: Sync isolated POC lockfile
        run: uv sync --locked --group test
      - name: Verify exact FastMCP version
        run: uv run --locked --group test python -c "import fastmcp; assert fastmcp.__version__ == '3.4.4'"
      - name: Run all Phase 0 tests
        run: uv run --locked --group test pytest -q --junitxml=phase0-results.xml
      - name: Build Phase 0 wheel
        run: uv build --wheel
      - name: Verify schema snapshots are unchanged
        run: git diff --exit-code -- snapshots
      - name: Upload Phase 0 JUnit evidence
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: phase0-junit
          path: poc/fastmcp-phase0/phase0-results.xml
          if-no-files-found: error

  root-and-phase1-3-regression:
    name: Root and Phase 1-3 regression
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v5
      - name: Sync root lockfile
        run: uv sync --locked --all-groups
      - name: Run legacy and CAD Core tests
        run: uv run pytest tests/ -q --junitxml=root-results.xml
      - name: Test and build Gateway
        working-directory: services/gateway
        run: |
          uv sync --locked --group test
          uv run --locked --group test pytest -q --junitxml=gateway-results.xml
          uv build --wheel
      - name: Build shared contracts
        working-directory: packages/contracts
        run: uv build --wheel
      - name: Test and build simulated Agent
        working-directory: poc/phase3-simulated-agent
        run: |
          uv sync --locked --group test
          uv run --locked --group test pytest -q --junitxml=simulated-agent-results.xml
          uv build --wheel
      - name: Upload regression JUnit evidence
        uses: actions/upload-artifact@v4
        with:
          name: phase1-3-regression-junit
          path: |
            root-results.xml
            services/gateway/gateway-results.xml
            poc/phase3-simulated-agent/simulated-agent-results.xml
          if-no-files-found: error

  static-isolation:
    name: Static and isolation checks
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v5
      - name: Check whitespace and Python syntax
        run: |
          git diff --check
          python -m compileall -q poc/fastmcp-phase0/src poc/fastmcp-phase0/tests
      - name: Enforce adapter and domain isolation
        run: |
          python - <<'PY'
          import ast
          from pathlib import Path

          adapter_root = Path("poc/fastmcp-phase0/src/fastmcp_phase0")
          adapter_source = "\n".join(
              path.read_text(encoding="utf-8") for path in adapter_root.rglob("*.py")
          )
          forbidden_private = ("_tool_manager", "fastmcp._", "from fastmcp._")
          assert not any(item in adapter_source for item in forbidden_private), (
              "Phase 0 adapter uses a FastMCP private API"
          )

          pure_roots = [
              Path("packages/cad_core/src"),
              Path("packages/contracts/src"),
              Path("services/gateway/src/autocad_gateway/domain"),
          ]
          forbidden_imports = {"fastmcp", "mcp", "starlette"}
          violations = []
          for root in pure_roots:
              for path in root.rglob("*.py"):
                  tree = ast.parse(path.read_text(encoding="utf-8"), filename=str(path))
                  for node in ast.walk(tree):
                      modules = []
                      if isinstance(node, ast.Import):
                          modules = [alias.name for alias in node.names]
                      elif isinstance(node, ast.ImportFrom) and node.module:
                          modules = [node.module]
                      for module in modules:
                          if module.split(".", 1)[0] in forbidden_imports:
                              violations.append(f"{path}: {module}")
          assert not violations, "Domain/core transport imports found:\n" + "\n".join(violations)
          PY
      - name: Prevent snapshot rewriting and committed credentials
        run: |
          python - <<'PY'
          from pathlib import Path

          tests_root = Path("poc/fastmcp-phase0/tests")
          write_markers = (".write_text(", ".write_bytes(", "snapshot.open(")
          offenders = []
          for path in tests_root.rglob("*.py"):
              source = path.read_text(encoding="utf-8")
              if "snapshot" in source.lower() and any(marker in source for marker in write_markers):
                  offenders.append(str(path))
          assert not offenders, "Snapshot tests may not rewrite snapshots: " + ", ".join(offenders)

          private_key_marker = "-----BEGIN " + "PRIVATE KEY-----"
          rsa_key_marker = "-----BEGIN RSA " + "PRIVATE KEY-----"
          token_markers = ("sk-proj-", "sk_live_")
          scan_roots = [
              Path("poc/fastmcp-phase0/src"),
              Path("poc/fastmcp-phase0/tests"),
              Path("poc/fastmcp-phase0/snapshots"),
          ]
          secrets = []
          for root in scan_roots:
              for path in root.rglob("*"):
                  if not path.is_file():
                      continue
                  text = path.read_text(encoding="utf-8", errors="ignore")
                  if private_key_marker in text or rsa_key_marker in text:
                      secrets.append(str(path))
                  if any(marker in text for marker in token_markers):
                      secrets.append(str(path))
          assert not secrets, "Credential-like fixture committed: " + ", ".join(sorted(set(secrets)))
          PY
      - name: Verify lockfiles and isolated POC lock
        run: |
          uv lock --check
          uv lock --check --project poc/fastmcp-phase0
          uv lock --check --project services/gateway
          uv lock --check --project poc/phase3-simulated-agent
          python - <<'PY'
          from pathlib import Path

          poc_lock = Path("poc/fastmcp-phase0/uv.lock")
          poc_project = Path("poc/fastmcp-phase0/pyproject.toml").read_text(encoding="utf-8")
          assert poc_lock.is_file(), "Phase 0 must keep its own lockfile"
          assert "[tool.uv.sources]" in poc_project
          assert "fastmcp==3.4.4" in poc_project
          PY
