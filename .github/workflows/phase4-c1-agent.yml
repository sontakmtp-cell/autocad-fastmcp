name: Phase 4 C1 Agent

on:
  push:
    paths:
      - "apps/desktop_agent/**"
      - "packages/contracts/**"
      - "services/gateway/**"
      - "lisp-code/mcp_dispatch.lsp"
      - "scripts/build-phase4-agent.ps1"
      - ".github/workflows/phase4-c1-agent.yml"
  pull_request:
    paths:
      - "apps/desktop_agent/**"
      - "packages/contracts/**"
      - "services/gateway/**"
      - "lisp-code/mcp_dispatch.lsp"
      - "scripts/build-phase4-agent.ps1"
      - ".github/workflows/phase4-c1-agent.yml"
  workflow_dispatch:

concurrency:
  group: phase4-c1-agent-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  windows-agent-tests:
    runs-on: windows-2022
    timeout-minutes: 15
    env:
      QT_QPA_PLATFORM: offscreen
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Sync Desktop Agent test environment
        working-directory: apps/desktop_agent
        run: uv sync --locked --python 3.12 --group test --group ui-test
      - name: Test Desktop Agent
        working-directory: apps/desktop_agent
        run: uv run --no-sync pytest -q
      - name: Test Phase 4 Gateway contract
        working-directory: services/gateway
        run: |
          uv sync --locked --group test
          uv run --no-sync pytest -q tests/test_phase4_c1.py tests/test_sqlite_repositories.py
      - name: Validate standalone build inputs
        shell: powershell
        run: |
          [void][ScriptBlock]::Create((Get-Content .\scripts\build-phase4-agent.ps1 -Raw))
          $required = @(
            '.\apps\desktop_agent\launcher.py',
            '.\apps\desktop_agent\pysidedeploy.spec',
            '.\lisp-code\mcp_dispatch.lsp'
          )
          foreach ($path in $required) {
            if (-not (Test-Path -LiteralPath $path)) { throw "Missing standalone build input: $path" }
          }
          Set-Location .\apps\desktop_agent
          uv run --no-sync python -c "import PySide6; from autocad_desktop_agent.__main__ import main; print('standalone imports ok')"

  standalone-release:
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    needs: windows-agent-tests
    runs-on: windows-2022
    timeout-minutes: 40
    env:
      QT_QPA_PLATFORM: offscreen
      NUITKA_CACHE_DIR: ${{ github.workspace }}\.nuitka-cache
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Restore Nuitka cache
        uses: actions/cache@v4
        with:
          path: .nuitka-cache
          key: nuitka-${{ runner.os }}-py312-${{ hashFiles('apps/desktop_agent/uv.lock', 'scripts/build-phase4-agent.ps1') }}
          restore-keys: |
            nuitka-${{ runner.os }}-py312-
      - name: Sync standalone build environment
        working-directory: apps/desktop_agent
        run: uv sync --locked --python 3.12 --group build --group ui-test
      - name: Build standalone Agent
        shell: powershell
        timeout-minutes: 35
        run: |
          $log = "$env:RUNNER_TEMP\phase4-build.log"
          Start-Transcript -Path $log -Force
          try {
            & .\scripts\build-phase4-agent.ps1 -OutputRoot "$env:RUNNER_TEMP\phase4-agent" -SkipSync
          }
          finally {
            Stop-Transcript
          }
      - name: Upload standalone build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phase4-c1-build-log
          path: ${{ runner.temp }}/phase4-build.log
          if-no-files-found: warn
      - name: Validate release manifest
        shell: powershell
        run: |
          $manifest = Get-Content "$env:RUNNER_TEMP\phase4-agent\manifest.json" -Raw | ConvertFrom-Json
          if ($manifest.schema -ne 'cad.agent.release/1') { throw 'Unexpected release manifest schema' }
          if (-not (Test-Path "$env:RUNNER_TEMP\phase4-agent\app\KythuatvangAutoCADAgent.exe")) { throw 'Standalone executable is missing' }
      - uses: actions/upload-artifact@v4
        with:
          name: phase4-c1-agent-windows-x64
          path: ${{ runner.temp }}/phase4-agent
          if-no-files-found: error
