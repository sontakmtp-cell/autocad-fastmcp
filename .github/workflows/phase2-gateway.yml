name: FastMCP Phase 2 Gateway

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  gateway:
    name: ${{ matrix.os }} / Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.10", "3.12", "3.13"]
    defaults:
      run:
        working-directory: services/gateway
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - uses: astral-sh/setup-uv@v5
      - name: Sync isolated Gateway lockfile
        run: uv sync --locked --group test
      - name: Verify exact FastMCP version
        run: uv run --locked --group test python -c "import fastmcp; assert fastmcp.__version__ == '3.4.4'"
      - name: Run Phase 2 Gateway regression tests
        run: uv run --locked --group test pytest -q -m "not phase3"
      - name: Run Phase 3 Gateway tests
        run: uv run --locked --group test pytest -q -m phase3
      - name: Build Gateway package
        run: uv build --wheel
      - name: Verify schema snapshots are unchanged
        run: git diff --exit-code -- services/gateway/snapshots

  phase3-contracts-and-simulator:
    name: Phase 3 contracts and simulator
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v5
      - name: Test shared contracts
        working-directory: packages/contracts
        run: uv build --wheel
      - name: Test independent simulated Agent
        working-directory: poc/phase3-simulated-agent
        run: |
          uv sync --locked --group test
          uv run --locked --group test pytest -q
          uv build --wheel

  legacy-and-phase0-regression:
    name: Legacy and Phase 0 regression
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v5
      - name: Run legacy and CAD Core tests
        run: uv run pytest tests/ -q
      - name: Run isolated Phase 0 compatibility tests
        working-directory: poc/fastmcp-phase0
        run: |
          uv sync --locked --group test
          uv run --locked --group test python -c "import fastmcp; assert fastmcp.__version__ == '3.4.4'"
          uv run --locked --group test pytest -q
      - name: Verify checked-in schema snapshots and whitespace
        run: |
          git diff --exit-code -- poc/fastmcp-phase0/snapshots services/gateway/snapshots
          git diff --check
